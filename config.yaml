# ============================================================
# config.yaml — Configuration globale du pipeline médical
# ============================================================

project:
  name: "medical-dqv-pipeline"
  version: "1.0.0"
  description: "Pipeline de nettoyage et vérification qualité de données médicales"

# --- Source de données ---
# IMPORTANT: Les URLs Kaggle (kaggle.com/datasets/...) ne sont PAS supportées directement
# car elles demandent une authentification. Options :
#   1. Utiliser une URL publique directe (CSV brut ou page HTML)
#   2. Télécharger manuellement depuis Kaggle → pointer vers le fichier local
#   3. Utiliser l'un des datasets UCI pré-configurés ci-dessous
#
# URLs de datasets publics recommandés :
#   - UCI Heart Disease: https://archive.ics.uci.edu/ml/machine-learning-databases/heart-disease/processed.cleveland.data
#   - Pima Diabetes: https://raw.githubusercontent.com/jbrownlee/Datasets/master/pima-indians-diabetes.data.csv
#   - UCI Breast Cancer: https://archive.ics.uci.edu/ml/machine-learning-databases/breast-cancer/breast-cancer.data
#   - GitHub Healthcare: https://raw.githubusercontent.com/stedy/Healthcare-Data/main/healthcare_data.csv
scraper:
  url: "https://archive.ics.uci.edu/ml/machine-learning-databases/heart-disease/processed.cleveland.data"
  mode: "static"          # static (HTTP/CSV) | dynamic (Selenium pour pages JS)
  request_delay: 1.5      # délai entre requêtes (secondes)
  timeout: 30             # timeout HTTP (secondes)
  max_retries: 3          # tentatives max si erreur réseau
  headless: true          # mode headless pour Selenium

# --- Chemins des données ---
paths:
  raw_data:         "data/raw/medical_raw.csv"
  anonymized_data:  "data/processed/medical_v1.0_anonymized.csv"
  transformed_data: "data/processed/medical_v1.0_transformed.csv"
  pipeline_pkl:     "data/processed/transformer_pipeline.pkl"
  dqv_report_html:  "reports/dqv_report.html"
  dqv_results_json: "reports/dqv_results.json"
  anon_report_json: "reports/anonymization_report.json"
  pipeline_log:     "reports/pipeline.log"
  eda_dir:          "reports/"

# --- Anonymisation ---
anonymization:
  k_anonymity: 3           # k minimum pour k-anonymity (plus élevé = plus de suppression)
  strategy: "replace"      # replace (synthétique Faker) | hash (HMAC) | drop (suppression)
  phi_direct:              # Identifiants directs (toujours supprimés/remplacés)
    - name
    - nom
    - prenom
    - first_name
    - last_name
    - email
    - phone
    - telephone
    - address
    - adresse
    - ssn
    - nss
    - nin
    - ip_address
    - patient_id
    - mrn
  phi_quasi:               # Quasi-identifiants (généralisés pour k-anonymity)
    - age
    - gender
    - sexe
    - zip_code
    - birth_date
    - ethnicity

# --- DQV (Data Quality Verification) ---
dqv:
  missing_threshold: 0.15       # Alerte si > 15% valeurs manquantes par colonne
  duplicate_tolerance: 0        # Nombre de doublons tolérés (0 = aucun)
  distribution_drift_threshold: 0.3  # Seuil de drift de distribution
  domain_rules:                 # Intervalles valides pour les métriques médicales
    age:               [0, 120]
    blood_pressure:    [50, 250]
    heart_rate:        [30, 220]
    glucose:           [30, 600]
    bmi:               [10, 70]
    temperature:       [35, 42]
    oxygen_saturation: [70, 100]

# --- Transformation ---
transformation:
  outlier_factor: 1.5           # IQR × factor
  outlier_strategy: "clip"      # clip | median
  scaler_method: "standard"     # standard | minmax
  max_ohe_cardinality: 5        # Max modalités pour OHE
  date_extract_features: true

# --- DVC ---
dvc:
  remote_name: "myremote"
  remote_type: "gdrive"         # gdrive | s3 | gcs | local
  version_tag: "v1.0-anonymized"
  auto_push: false

# --- Streamlit ---
streamlit:
  page_title: "Medical DQV Pipeline"
  layout: "wide"
  sidebar_state: "expanded"
