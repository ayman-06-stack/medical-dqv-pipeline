  transform:
    cmd: python -c " import pandas as pd; import sys; sys.path.insert(0, 'src');
      from transformer import MedicalTransformer; df = 
      pd.read_csv('data/processed/medical_v1.0_anonymized.csv'); t = 
      MedicalTransformer(); result = t.fit_transform(df); 
      result.to_csv('data/processed/medical_v1.0_transformed.csv', index=False) 
