  dqv:
    cmd: python -c " import pandas as pd; import sys; sys.path.insert(0, 'src');
      from dqv import DataQualityVerifier, DQVConfig; df = 
      pd.read_csv('data/processed/medical_v1.0_anonymized.csv'); gate, _ = 
      DataQualityVerifier(DQVConfig()).run(df); sys.exit(0 if gate else 1) "
    deps:
