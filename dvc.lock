  anonymize:
    cmd: python -c " import pandas as pd; import sys; sys.path.insert(0, 'src');
      from anonymizer import MedicalAnonymizer; df = 
      pd.read_csv('data/raw/medical_raw.csv'); MedicalAnonymizer(k=3, 
      strategy='replace', 
      output_path='data/processed/medical_v1.0_anonymized.csv', 
      report_path='reports/anonymization_report.json').run(df) "
